<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuongDZ</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#loading{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#main{
display:none;
padding-top:80px;
}

h1{
font-size:55px;
text-shadow:0 0 20px #00ff00;
}

#typing{
font-size:28px;
margin-top:20px;
height:40px;
}

#clock{
margin:20px;
font-size:30px;
color:#00ffff;
}

button{
padding:15px 35px;
margin:15px;
font-size:22px;
background:black;
color:#00ff00;
border:2px solid #00ff00;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00ff00;
color:black;
box-shadow:0 0 25px #00ff00;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div id="loading">
<h1>👋 Xin chào!</h1>
<p>Đây là trang web của CuongDZ</p>
</div>

<div id="main">

<h1>CuongDZ</h1>

<div id="typing"></div>

<div id="clock"></div>

<a href="snake.html">
<button>🐍 Rắn săn mồi</button>
</a>

<a href="caro.html">
<button>❌ Cờ caro</button>
</a>

</div>

<script>

setTimeout(()=>{
loading.style.display="none";
main.style.display="block";
},1000);

const text="Chào mừng đến với website của CuongDZ";
let i=0;

function type(){

if(i<text.length){
typing.innerHTML+=text.charAt(i);
i++;
setTimeout(type,80);
}

}

type();

function time(){

const d=new Date();

clock.innerHTML=d.toLocaleTimeString();

}

setInterval(time,1000);

time();

const canvas=document.getElementById("matrix");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";

const fontSize=16;

const columns=Math.floor(canvas.width/fontSize);

const drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){

drops[i]=0;

}

drops[i]++;

}

}

setInterval(draw,33);

window.onresize=()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

};

</script>

</body>
</html>
