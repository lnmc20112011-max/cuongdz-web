<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuongDZ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* Màn hình chào */
#loading{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

#loading h1{
    font-size:45px;
    margin-bottom:10px;
}

#loading p{
    font-size:20px;
}

/* Trang chính */
#main{
    display:none;
    min-height:100vh;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    width:90%;
    max-width:400px;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    color:#0072ff;
    margin-bottom:10px;
    font-size:32px;
}

p{
    color:#444;
    margin-bottom:25px;
    font-size:18px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}
</style>

</head>
<body>

<!-- Màn hình chào -->
<div id="loading">
    <h1>👋 Xin chào!</h1>
    <p>Đây là trang web của <b>CuongDZ</b>.</p>
</div>

<!-- Trang chính -->
<div id="main">
    <div class="box">

        <h2>🎉 CuongDZ</h2>

        <p>Chào mừng bạn đến với website của mình ❤️</p>

        <button onclick="alert('Cảm ơn bạn đã ghé thăm website của CuongDZ!')">
            🚀 Khám phá
        </button>

    </div>
</div>

<script>
setTimeout(function(){
    document.getElementById("loading").style.display="none";
    document.getElementById("main").style.display="flex";
},1000);
</script>

</body>
