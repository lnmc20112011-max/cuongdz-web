<!DOCTYPE html><html><head><meta charset='utf-8'><title>Snake</title><style>body{background:#111;color:#fff;text-align:center;font-family:Arial}canvas{background:#000;border:2px solid #0f0}</style></head><body><h2>🐍 Rắn săn mồi</h2><p>Điểm: <span id='s'>0</span></p><canvas id='c' width='400' height='400'></canvas><script>
const ctx=c.getContext('2d');const G=20,N=20;let snake=[{x:10,y:10}],dir={x:1,y:0},food={x:5,y:5},score=0;
document.onkeydown=e=>{if(e.key==='ArrowUp'&&dir.y!=1)dir={x:0,y:-1};if(e.key==='ArrowDown'&&dir.y!=-1)dir={x:0,y:1};if(e.key==='ArrowLeft'&&dir.x!=1)dir={x:-1,y:0};if(e.key==='ArrowRight'&&dir.x!=-1)dir={x:1,y:0};};
function newFood(){food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)}}
newFood();
setInterval(()=>{let h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.y<0||h.x>=N||h.y>=N||snake.some(v=>v.x==h.x&&v.y==h.y)){alert('Game Over!');snake=[{x:10,y:10}];dir={x:1,y:0};score=0;s.textContent=0;newFood();return;}snake.unshift(h);if(h.x==food.x&&h.y==food.y){score++;s.textContent=score;newFood();}else snake.pop();ctx.fillStyle='#000';ctx.fillRect(0,0,400,400);ctx.fillStyle='red';ctx.fillRect(food.x*G,food.y*G,G-1,G-1);ctx.fillStyle='#0f0';snake.forEach(v=>ctx.fillRect(v.x*G,v.y*G,G-1,G-1));},120);
</script></body></html>
