<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Rắn săn mồi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    color:#00ff00;
    margin-top:20px;
}

#score{
    font-size:24px;
    margin:15px;
}

canvas{
    background:#000;
    border:3px solid #00ff00;
    margin-top:10px;
}

#controls{
    margin-top:20px;
}

#controls button{
    width:70px;
    height:70px;
    font-size:35px;
    margin:5px;
    border:none;
    border-radius:15px;
    background:#00ff00;
    color:black;
}

.back{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#0099ff;
    color:white;
}

</style>

</head>

<body>

<h1>🐍 Rắn săn mồi</h1>

<div id="score">
Điểm:
<span id="point">0</span>
</div>
  
<div id="highscore">
Kỷ lục:
<span id="best">0</span>
</div>
<canvas
id="game"
width="400"
height="400">
</canvas>

<div id="controls">

<button onclick="up()">⬆️</button>

<br>

<button onclick="left()">⬅️</button>

<button onclick="down()">⬇️</button>

<button onclick="right()">➡️</button>

</div>

<br>

<button
class="back"
onclick="location.href='index.html'">
⬅ Quay về
</button>

<script>

const canvas=document.getElementById("game");

const ctx=canvas.getContext("2d");

const box=20;

let snake=[
{
x:10*box,
y:10*box
}
];

let direction="RIGHT";

let food={
x:Math.floor(Math.random()*20)*box,
y:Math.floor(Math.random()*20)*box
};

let score=0; 
let snakeSpeed = 8;
let best = localStorage.getItem("snake_best") || 0;

document.getElementById("best").innerHTML = best;
document.addEventListener("keydown",moveKey);

function moveKey(e){

if(e.key=="ArrowUp"&&direction!="DOWN")
direction="UP";

if(e.key=="ArrowDown"&&direction!="UP")
direction="DOWN";

if(e.key=="ArrowLeft"&&direction!="RIGHT")
direction="LEFT";

if(e.key=="ArrowRight"&&direction!="LEFT")
direction="RIGHT";

}

function up(){

if(direction!="DOWN")
direction="UP";

}

function down(){

if(direction!="UP")
direction="DOWN";

}

function left(){

if(direction!="RIGHT")
direction="LEFT";

}

function right(){

if(direction!="LEFT")
direction="RIGHT";

}
  function collision(head,array){

for(let i=0;i<array.length;i++){

if(head.x==array[i].x&&head.y==array[i].y){

return true;

}

}

return false;

}

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,400,400);

for(let i=0;i<snake.length;i++){

ctx.fillStyle=(i==0)?"lime":"green";

ctx.fillRect(snake[i].x,snake[i].y,box-2,box-2);

}

ctx.fillStyle="red";

ctx.fillRect(food.x,food.y,box-2,box-2);

let snakeX=snake[0].x;

let snakeY=snake[0].y;

if(direction=="LEFT") snakeX-=box;

if(direction=="RIGHT") snakeX+=box;

if(direction=="UP") snakeY-=box;

if(direction=="DOWN") snakeY+=box;

if(snakeX==food.x&&snakeY==food.y){

score++;

document.getElementById("point").innerHTML = score;

if(score > best){

    best = score;

    document.getElementById("best").innerHTML = best;

    localStorage.setItem("snake_best", best);

}

if(score % 5 == 0 && snakeSpeed < 18){

    snakeSpeed++;

}

food={

x:Math.floor(Math.random()*20)*box,

y:Math.floor(Math.random()*20)*box

};

}else{

snake.pop();

}

let newHead={

x:snakeX,

y:snakeY

};

if(

snakeX<0||

snakeY<0||

snakeX>=400||

snakeY>=400||

collision(newHead,snake)

){

requestAnimationFrame(gameLoop);

if(confirm("💀 Game Over!\n\nĐiểm của bạn: " + score + "\n\nNhấn OK để chơi lại.")){
    location.reload();
}

return;

}

snake.unshift(newHead);

}

let lastTime = 0;

function gameLoop(currentTime){

    if(currentTime - lastTime > 1000 / snakeSpeed){

        draw();

        lastTime = currentTime;

    }

    requestAnimationFrame(gameLoop);

}

requestAnimationFrame(gameLoop);

</script>

</body>
</html>
