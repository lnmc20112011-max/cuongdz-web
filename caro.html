<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cờ Caro | CuongDZ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e3a8a);

color:white;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.container{

width:95%;

max-width:500px;

text-align:center;

}

h1{

margin-bottom:20px;

font-size:38px;

}

select{

padding:12px;

font-size:18px;

border:none;

border-radius:10px;

margin-bottom:15px;

cursor:pointer;

}

#status{

font-size:22px;

margin-bottom:20px;

font-weight:bold;

}

.board{

display:grid;

grid-template-columns:repeat(3,110px);

grid-template-rows:repeat(3,110px);

gap:8px;

justify-content:center;

margin:auto;

}

.cell{

background:#1e293b;

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

font-size:60px;

cursor:pointer;

transition:.2s;

user-select:none;

}

.cell:hover{

background:#334155;

transform:scale(1.03);

}

.win{

background:#22c55e !important;

}

.buttons{

margin-top:25px;

display:flex;

justify-content:center;

gap:10px;

flex-wrap:wrap;

}

button{

padding:12px 22px;

font-size:18px;

border:none;

border-radius:10px;

cursor:pointer;

background:#2563eb;

color:white;

transition:.2s;

}

button:hover{

transform:scale(1.05);

background:#1d4ed8;

}

#gameOver{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.88);

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999;

}

#resultText{

font-size:42px;

margin-bottom:25px;

}

</style>

</head>

<body>

<div class="container">

<h1>🎮 Cờ Caro</h1>

<select id="mode">

<option value="pvp">👥 Hai người</option>

<option value="easy">😀 AI Dễ</option>

<option value="medium">😎 AI Trung bình</option>

<option value="hard">💀 AI Khó</option>

</select>

<div id="status">

Lượt: X

</div>

<div class="board" id="board">

</div>

<div class="buttons">

<button onclick="restart()">

🔄 Chơi lại

</button>

<button onclick="location.href='index.html'">

🏠 Trang chủ

</button>

</div>

</div>

<div id="gameOver">

<h1 id="resultText"></h1>

<button onclick="restart()">

🔄 Chơi lại

</button>

<br>

<button onclick="location.href='index.html'">

🏠 Trang chủ

</button>

</div>

<script>
const board=document.getElementById("board");
const status=document.getElementById("status");
const resultText=document.getElementById("resultText");
const gameOverScreen=document.getElementById("gameOver");

let current="X";
let gameOver=false;

let game=[
"","","",
"","","",
"","",""
];

let cells=[];

const winLines=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

for(let i=0;i<9;i++){

const cell=document.createElement("div");

cell.className="cell";

cell.onclick=()=>play(i);

board.appendChild(cell);

cells.push(cell);

}

function play(i){

if(gameOver)return;

if(game[i]!="")return;

game[i]=current;

cells[i].innerHTML=current;

if(checkWinner())return;

current=current=="X"?"O":"X";

status.innerHTML="Lượt: "+current;
if(current=="O" && !gameOver){

    let mode=document.getElementById("mode").value;

    if(mode=="easy"){

        setTimeout(aiEasy,300);

    }

    else if(mode=="medium"){

        setTimeout(aiMedium,300);

    }

}
let mode=document.getElementById("mode").value;

if(current=="O"&&!gameOver){

if(mode=="easy"){

setTimeout(aiEasy,300);

}

else if(mode=="medium"){

setTimeout(aiMedium,300);

}

else if(mode=="hard"){

setTimeout(aiHard,300);

}

}

}

function checkWinner(){

for(let line of winLines){

let a=line[0];

let b=line[1];

let c=line[2];

if(game[a]!=""&&game[a]==game[b]&&game[b]==game[c]){

cells[a].classList.add("win");

cells[b].classList.add("win");

cells[c].classList.add("win");

gameOver=true;

resultText.innerHTML="🏆 "+game[a]+" THẮNG!";

gameOverScreen.style.display="flex";

return true;

}

}

if(!game.includes("")){

gameOver=true;

resultText.innerHTML="🤝 HÒA!";

gameOverScreen.style.display="flex";

return true;

}

return false;

}

function restart(){

location.reload();

    }
// ======================
// 😀 AI DỄ
// ======================

function aiEasy(){

    let empty=[];

    for(let i=0;i<9;i++){

        if(game[i]==""){

            empty.push(i);

        }

    }

    if(empty.length==0)return;

    let move=empty[Math.floor(Math.random()*empty.length)];

    play(move);

}

// ======================
// 😎 AI TRUNG BÌNH
// ======================

function aiMedium(){

    // 1. AI thắng nếu có thể

    for(let line of winLines){

        let empty=-1;

        let countO=0;

        for(let i of line){

            if(game[i]=="O") countO++;

            if(game[i]=="") empty=i;

        }

        if(countO==2 && empty!=-1){

            play(empty);

            return;

        }

    }

    // 2. Chặn người chơi

    for(let line of winLines){

        let empty=-1;

        let countX=0;

        for(let i of line){

            if(game[i]=="X") countX++;

            if(game[i]=="") empty=i;

        }

        if(countX==2 && empty!=-1){

            play(empty);

            return;

        }

    }

    // 3. Ưu tiên ô giữa

    if(game[4]==""){

        play(4);

        return;

    }

    // 4. Ưu tiên góc

    let corners=[0,2,6,8];

    let available=[];

    for(let c of corners){

        if(game[c]==""){

            available.push(c);

        }

    }

    if(available.length>0){

        let move=available[Math.floor(Math.random()*available.length)];

        play(move);

        return;

    }

    // 5. Cuối cùng đánh ngẫu nhiên

    aiEasy();

    }
